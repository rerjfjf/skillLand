<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Robot UI</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #f7f7f7 0%, #ececec 100%);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .scene {
      position: relative;
      width: 420px;
      height: 520px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .robot {
      position: relative;
      width: 230px;
      height: 360px;
      animation: floatBot 3.2s ease-in-out infinite;
      transform-origin: center;
    }

    @keyframes floatBot {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-14px); }
      100% { transform: translateY(0px); }
    }

    /* ГОЛОВА */
    .head {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 170px;
      height: 102px;
      background: linear-gradient(145deg, #ffffff 0%, #e7e7e7 75%, #cfcfcf 100%);
      border-radius: 52% 52% 48% 48% / 68% 68% 34% 34%;
      box-shadow:
        inset 10px 10px 18px rgba(255,255,255,0.95),
        inset -12px -12px 20px rgba(0,0,0,0.08),
        0 16px 25px rgba(0,0,0,0.08);
      z-index: 4;
    }

    .face {
      position: absolute;
      left: 50%;
      top: 17px;
      transform: translateX(-50%);
      width: 120px;
      height: 58px;
      background:
        radial-gradient(circle at 35% 35%, rgba(255,255,255,0.12), transparent 40%),
        linear-gradient(180deg, #101215 0%, #050607 100%);
      border-radius: 50px;
      box-shadow:
        inset 0 0 18px rgba(255,255,255,0.08),
        inset 0 -8px 12px rgba(0,0,0,0.45);
      overflow: hidden;
    }

    .eye-area {
      position: absolute;
      inset: 0;
    }

    .eye {
      position: absolute;
      width: 26px;
      height: 18px;
      background: radial-gradient(circle at 50% 50%, #44c7ff 0%, #1d8fff 50%, #003cff 100%);
      border-radius: 50% 50% 48% 48%;
      box-shadow:
        0 0 10px rgba(61, 173, 255, 0.8),
        0 0 24px rgba(61, 173, 255, 0.45);
      transition: transform 0.45s ease;
      top: 19px;
    }

    .eye.left {
      left: 26px;
    }

    .eye.right {
      right: 26px;
    }

    .eye::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 5px;
      width: 7px;
      height: 4px;
      background: rgba(255,255,255,0.8);
      border-radius: 50%;
      filter: blur(0.5px);
    }

    /* ШЕЯ-ПЕРЕХОД */
    .neck {
      position: absolute;
      top: 84px;
      left: 50%;
      transform: translateX(-50%);
      width: 70px;
      height: 28px;
      background: linear-gradient(180deg, #f3f3f3 0%, #d8d8d8 100%);
      border-radius: 0 0 30px 30px;
      z-index: 2;
      box-shadow: inset 0 -4px 8px rgba(0,0,0,0.06);
    }

    /* ТУЛОВИЩЕ */
    .body {
      position: absolute;
      left: 50%;
      top: 92px;
      transform: translateX(-50%);
      width: 155px;
      height: 215px;
      background: linear-gradient(145deg, #ffffff 0%, #ededed 60%, #cfcfcf 100%);
      border-radius: 44% 44% 40% 40% / 20% 20% 78% 78%;
      box-shadow:
        inset 12px 12px 20px rgba(255,255,255,0.95),
        inset -14px -16px 24px rgba(0,0,0,0.08),
        0 18px 28px rgba(0,0,0,0.08);
      z-index: 1;
      overflow: hidden;
    }

    .body::before {
      content: "";
      position: absolute;
      top: 16px;
      left: 22px;
      width: 34px;
      height: 150px;
      background: linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,255,255,0.08));
      border-radius: 50px;
      transform: rotate(8deg);
      filter: blur(2px);
    }

    .body::after {
      content: "";
      position: absolute;
      right: 14px;
      top: 34px;
      width: 30px;
      height: 140px;
      background: linear-gradient(180deg, rgba(0,0,0,0.05), rgba(0,0,0,0));
      border-radius: 50px;
      filter: blur(3px);
    }

    /* РУКИ */
    .arm {
      position: absolute;
      top: 150px;
      width: 42px;
      height: 150px;
      background: linear-gradient(145deg, #ffffff 0%, #e6e6e6 65%, #c9c9c9 100%);
      border-radius: 48% 48% 52% 52% / 18% 18% 82% 82%;
      box-shadow:
        inset 7px 7px 14px rgba(255,255,255,0.9),
        inset -8px -10px 14px rgba(0,0,0,0.08),
        0 8px 16px rgba(0,0,0,0.08);
      z-index: 0;
    }

    .arm.left {
      left: 10px;
      transform: rotate(18deg);
      animation: armLeft 3.2s ease-in-out infinite;
    }

    .arm.right {
      right: 10px;
      transform: rotate(-18deg);
      animation: armRight 3.2s ease-in-out infinite;
    }

    @keyframes armLeft {
      0%   { transform: rotate(18deg) translateY(0px); }
      50%  { transform: rotate(24deg) translateY(-6px); }
      100% { transform: rotate(18deg) translateY(0px); }
    }

    @keyframes armRight {
      0%   { transform: rotate(-18deg) translateY(0px); }
      50%  { transform: rotate(-24deg) translateY(-6px); }
      100% { transform: rotate(-18deg) translateY(0px); }
    }

    .shadow {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 20px;
      background: rgba(0, 0, 0, 0.16);
      filter: blur(10px);
      border-radius: 50%;
      animation: shadowMove 3.2s ease-in-out infinite;
    }

    @keyframes shadowMove {
      0%   { width: 110px; opacity: 0.18; }
      50%  { width: 85px; opacity: 0.11; }
      100% { width: 110px; opacity: 0.18; }
    }

    @media (max-width: 500px) {
      .scene {
        transform: scale(0.82);
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="shadow"></div>

    <div class="robot">
      <div class="head">
        <div class="face">
          <div class="eye-area">
            <div class="eye left" id="eyeLeft"></div>
            <div class="eye right" id="eyeRight"></div>
          </div>
        </div>
      </div>

      <div class="neck"></div>
      <div class="arm left"></div>
      <div class="arm right"></div>
      <div class="body"></div>
    </div>
  </div>

  <script>
    const leftEye = document.getElementById("eyeLeft");
    const rightEye = document.getElementById("eyeRight");

    function moveEyes() {
      const x1 = Math.random() * 10 - 5;
      const y1 = Math.random() * 6 - 3;

      const x2 = Math.random() * 10 - 5;
      const y2 = Math.random() * 6 - 3;

      leftEye.style.transform = `translate(${x1}px, ${y1}px)`;
      rightEye.style.transform = `translate(${x2}px, ${y2}px)`;
    }

    moveEyes();
    setInterval(moveEyes, 1200);
  </script>
</body>
</html>
