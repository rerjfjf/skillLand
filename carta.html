<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Изометрический город — HTML/CSS</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #dfe8f5;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .scene {
      position: relative;
      width: min(100vw, 1100px);
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: linear-gradient(135deg, #cbd8eb 0%, #e6eef8 48%, #bcd1e8 100%);
      border-radius: 18px;
      box-shadow: 0 30px 80px rgba(28, 45, 78, 0.28);
    }

    .map {
      position: absolute;
      inset: -18% -9% -20% -10%;
      transform: rotateX(58deg) rotateZ(-37deg);
      transform-style: preserve-3d;
    }

    .ground {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent 0 9%, white 9% 9.5%, transparent 9.5% 23%, white 23% 23.5%, transparent 23.5% 39%, white 39% 39.5%, transparent 39.5% 56%, white 56% 56.5%, transparent 56.5% 75%, white 75% 75.5%, transparent 75.5%),
        linear-gradient(0deg, transparent 0 13%, white 13% 13.5%, transparent 13.5% 29%, white 29% 29.5%, transparent 29.5% 49%, white 49% 49.5%, transparent 49.5% 67%, white 67% 67.5%, transparent 67.5% 85%, white 85% 85.5%, transparent 85.5%),
        linear-gradient(90deg, transparent 0 8%, #444 8% 10%, transparent 10% 22%, #444 22% 24%, transparent 24% 38%, #444 38% 40%, transparent 40% 55%, #444 55% 57%, transparent 57% 74%, #444 74% 76%, transparent 76%),
        linear-gradient(0deg, transparent 0 12%, #444 12% 14%, transparent 14% 28%, #444 28% 30%, transparent 30% 48%, #444 48% 50%, transparent 50% 66%, #444 66% 68%, transparent 68% 84%, #444 84% 86%, transparent 86%),
        linear-gradient(135deg, #d9e3ef, #c8d4e0);
    }

    .beach {
      position: absolute;
      right: -11%;
      bottom: -11%;
      width: 49%;
      height: 68%;
      background: linear-gradient(135deg, #f4e4bc, #e8d5a3, #f4e4bc);
      border-radius: 50% 30% 70% 40% / 40% 60% 30% 50%;
      box-shadow: 0 10px 30px rgba(0,0,0,.2);
    }

    .beach::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle at 20% 80%, rgba(0,0,0,.1) 1px, transparent 1px),
                        radial-gradient(circle at 80% 20%, rgba(0,0,0,.1) 1px, transparent 1px),
                        radial-gradient(circle at 40% 40%, rgba(0,0,0,.05) 1px, transparent 1px);
      background-size: 10px 10px, 15px 15px, 20px 20px;
      border-radius: inherit;
    }

    .water {
      position: absolute;
      right: -8%;
      bottom: -8%;
      width: 43%;
      height: 62%;
      background: linear-gradient(135deg, #0a74a8, #06578e, #0a74a8);
      border-radius: 50% 30% 70% 40% / 40% 60% 30% 50%;
      box-shadow: inset 0 0 60px rgba(255,255,255,.12), 0 5px 15px rgba(0,0,0,.3);
      animation: shimmer 4s infinite ease-in-out;
    }

    @keyframes shimmer {
      0%, 100% {
        box-shadow: inset 0 0 60px rgba(255,255,255,.12);
        background: linear-gradient(135deg, #0a74a8, #06578e, #0a74a8);
      }
      50% {
        box-shadow: inset 0 0 80px rgba(255,255,255,.3);
        background: linear-gradient(135deg, #0a74a8, #0b7bb0, #06578e);
      }
    }

    .park {
      position: absolute;
      background: #73b86d;
      border-radius: 12px;
      box-shadow: inset 0 0 0 6px rgba(255,255,255,.25);
    }

    .park.one { left: 54%; top: 25%; width: 13%; height: 11%; }
    .park.two { left: 64%; top: 8%; width: 20%; height: 16%; }
    .park.three { left: 51%; top: 49%; width: 13%; height: 9%; }

    .block {
      position: absolute;
      width: var(--w);
      height: var(--d);
      left: var(--x);
      top: var(--y);
      transform-style: preserve-3d;
      transform: translateZ(var(--h));
    }

    .building {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
    }

    .face {
      position: absolute;
      background: var(--color);
      border: 1px solid rgba(255,255,255,.35);
      box-shadow: inset 0 0 18px rgba(255,255,255,.16);
    }

    .front {
      width: 100%;
      height: var(--h);
      left: 0;
      bottom: calc(-1 * var(--h));
      transform-origin: top;
      transform: rotateX(-90deg);
      background: linear-gradient(90deg, var(--dark), var(--color));
    }

    .back {
      width: 100%;
      height: var(--h);
      left: 0;
      top: calc(-1 * var(--h));
      transform-origin: bottom;
      transform: rotateX(90deg);
      background: linear-gradient(90deg, var(--dark), var(--color));
    }

    .side {
      width: var(--d);
      height: var(--h);
      right: calc(-1 * var(--d));
      bottom: calc(-1 * var(--h));
      transform-origin: left top;
      transform: rotateY(90deg) rotateX(-90deg);
      background: linear-gradient(90deg, var(--color), var(--dark));
    }

    .top {
      width: 100%;
      height: 100%;
      transform: translateZ(0);
      background: linear-gradient(135deg, var(--light), var(--color));
    }

    .windows::after {
      content: "";
      position: absolute;
      inset: 8px;
      background-image:
        repeating-linear-gradient(90deg, rgba(255,255,255,.75) 0 4px, transparent 4px 13px),
        repeating-linear-gradient(0deg, rgba(255,255,255,.45) 0 3px, transparent 3px 14px);
      opacity: .55;
    }

    .tower {
      --color: #b9c0cc;
      --dark: #7d8795;
      --light: #e8edf5;
    }

    .glass {
      --color: #79b8d5;
      --dark: #407b9e;
      --light: #d3eef9;
    }

    .brick {
      --color: #b56f61;
      --dark: #7f483f;
      --light: #dfa094;
    }

    .beige {
      --color: #d9c4ab;
      --dark: #9d826a;
      --light: #f2dfc8;
    }

    .purple {
      --color: #b7a6d8;
      --dark: #756695;
      --light: #e1d5ff;
    }

    .orange {
      --color: #e0a55d;
      --dark: #a66e33;
      --light: #ffd08b;
    }

    .pier,
    .dock {
      position: absolute;
      background: #eef3fa;
      border-radius: 5px;
      box-shadow: 0 3px 0 rgba(42,61,92,.16);
    }

    .pier.main { right: 7%; bottom: 25%; width: 26%; height: 4%; }
    .pier.long { right: 9%; bottom: 9%; width: 34%; height: 3%; }
    .pier.side { right: 20%; bottom: 13%; width: 4%; height: 20%; }
    .dock.one { right: 27%; bottom: 20%; width: 9%; height: 6%; background: #c06d55; }
    .dock.two { right: 13%; bottom: 31%; width: 8%; height: 4%; background: #dde7f2; }

    .stadium {
      position: absolute;
      right: 21%;
      bottom: 27%;
      width: 17%;
      height: 8%;
      background: linear-gradient(90deg, #c8d1dd, #f7fbff, #8794a7);
      border-radius: 20px;
      box-shadow: 0 8px 0 rgba(73,91,117,.25);
    }

    .flag {
      position: absolute;
      right: 41%;
      bottom: 45%;
      width: 20px;
      height: 20px;
      transform: translateZ(180px) rotateZ(37deg) rotateX(-58deg);
      background:
        conic-gradient(#111 0 25%, #fff 0 50%, #111 0 75%, #fff 0);
      background-size: 10px 10px;
      border: 2px solid #222;
      border-radius: 2px;
      box-shadow: 0 12px 18px rgba(0,0,0,.24);
    }

    .ship {
      position: absolute;
      left: 28%;
      bottom: 16%;
      width: 13%;
      height: 5%;
      background: #f1e1c7;
      border-radius: 50% 50% 12px 12px;
      box-shadow: 0 6px 0 #a97856;
    }

    .ship::before {
      content: "";
      position: absolute;
      left: 18%;
      top: -70%;
      width: 55%;
      height: 80%;
      background: #e9eef5;
      border-radius: 4px;
    }

    @media (max-width: 720px) {
      .scene { border-radius: 0; width: 100vw; height: 100vh; aspect-ratio: auto; }
      .map { inset: -8% -45% -10% -38%; transform: rotateX(58deg) rotateZ(-37deg) scale(.95); }
    }
  </style>
</head>
<body>
  <main class="scene" aria-label="CSS-верстка изометрического города">
    <section class="map">
      <div class="ground"></div>
      <div class="beach"></div>
      <div class="water"></div>

      <div class="park one"></div>
      <div class="park two"></div>
      <div class="park three"></div>

      <div class="pier main"></div>
      <div class="pier long"></div>
      <div class="pier side"></div>
      <div class="dock one"></div>

      <div class="block" style="--x:10%;--y:15%;--w:5%;--d:5%;--h:190px"><div class="building tower"><div class="face top"></div><div class="face back"></div><div class="face front windows"></div><div class="face side windows"></div></div></div>
      <div class="block" style="--x:17%;--y:12%;--w:6%;--d:6%;--h:150px"><div class="building glass"><div class="face top"></div><div class="face back"></div><div class="face front windows"></div><div class="face side windows"></div></div></div>
      <div class="block" style="--x:24%;--y:13%;--w:5%;--d:7%;--h:230px"><div class="building tower"><div class="face top"></div><div class="face back"></div><div class="face front windows"></div><div class="face side windows"></div></div></div>
      <div class="block" style="--x:31%;--y:10%;--w:6%;--d:7%;--h:180px"><div class="building purple"><div class="face top"></div><div class="face back"></div><div class="face front windows"></div><div class="face side windows"></div></div></div>
      <div class="block" style="--x:39%;--y:9%;--w:7%;--d:8%;--h:250px"><div class="building glass"><div class="face top"></div><div class="face back"></div><div class="face front windows"></div><div class="face side windows"></div></div></div>
      <div class="block" style="--x:48%;--y:12%;--w:8%;--d:9%;--h:270px"><div class="building glass"><div class="face top"></div><div class="face back"></div><div class="face front windows"></div><div class="face side windows"></div></div></div>

      <div class="block" style="--x:9%;--y:32%;--w:7%;--d:7%;--h:130px"><div class="building beige"><div class="face top"></div><div class="face back"></div><div class="face front windows"></div><div class="face side windows"></div></div></div>
      <div class="block" style="--x:18%;--y:31%;--w:7%;--d:8%;--h:170px"><div class="building tower"><div class="face top"></div><div class="face back"></div><div class="face front windows"></div><div class="face side windows"></div></div></div>
      <div class="block" style="--x:28%;--y:30%;--w:8%;--d:9%;--h:210px"><div class="building brick"><div class="face top"></div><div class="face back"></div><div class="face front windows"></div><div class="face side windows"></div></div></div>
      <div class="block" style="--x:39%;--y:31%;--w:8%;--d:8%;--h:165px"><div class="building beige"><div class="face top"></div><div class="face back"></div><div class="face front windows"></div><div class="face side windows"></div></div></div>
      <div class="block" style="--x:50%;--y:32%;--w:7%;--d:8%;--h:120px"><div class="building orange"><div class="face top"></div><div class="face back"></div><div class="face front windows"></div><div class="face side windows"></div></div></div>

      <div class="block" style="--x:8%;--y:50%;--w:8%;--d:9%;--h:115px"><div class="building brick"><div class="face top"></div><div class="face back"></div><div class="face front windows"></div><div class="face side windows"></div></div></div>
      <div class="block" style="--x:20%;--y:49%;--w:10%;--d:8%;--h:90px"><div class="building beige"><div class="face top"></div><div class="face back"></div><div class="face front windows"></div><div class="face side windows"></div></div></div>
      <div class="block" style="--x:34%;--y:50%;--w:7%;--d:9%;--h:160px"><div class="building tower"><div class="face top"></div><div class="face back"></div><div class="face front windows"></div><div class="face side windows"></div></div></div>
      <div class="block" style="--x:44%;--y:51%;--w:8%;--d:8%;--h:105px"><div class="building brick"><div class="face top"></div><div class="face back"></div><div class="face front windows"></div><div class="face side windows"></div></div></div>

      <div class="block" style="--x:63%;--y:18%;--w:8%;--d:7%;--h:70px"><div class="building brick"><div class="face top"></div><div class="face back"></div><div class="face front"></div><div class="face side"></div></div></div>
      <div class="block" style="--x:73%;--y:16%;--w:8%;--d:7%;--h:65px"><div class="building brick"><div class="face top"></div><div class="face back"></div><div class="face front"></div><div class="face side"></div></div></div>
      <div class="block" style="--x:64%;--y:30%;--w:8%;--d:7%;--h:65px"><div class="building brick"><div class="face top"></div><div class="face back"></div><div class="face front"></div><div class="face side"></div></div></div>
      <div class="block" style="--x:75%;--y:29%;--w:8%;--d:7%;--h:60px"><div class="building brick"><div class="face top"></div><div class="face back"></div><div class="face front"></div><div class="face side"></div></div></div>

      <div class="flag"></div>
    </section>
  </main>
</body>
</html>
